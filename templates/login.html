{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow border-0 rounded-4 bg-body-tertiary">
            <div class="card-header bg-dark text-white text-center py-3 rounded-top-4">
                <h4 class="mb-0"><i class="fa-solid fa-lock me-2"></i>Acesso Restrito</h4>
            </div>
            <div class="card-body p-4">
                <p class="text-center text-body-secondary mb-4">Por favor, insira a palavra-passe de administrador para aceder às configurações de catálogos e TARs.</p>
                
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label fw-bold text-body">Palavra-passe</label>
                        <div class="input-group">
                            <span class="input-group-text bg-body-secondary border-secondary-subtle"><i class="fa-solid fa-key"></i></span>
                            <input type="password" name="password" class="form-control bg-body text-body border-secondary-subtle" placeholder="Inserir palavra-passe" required autofocus>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">
                        ENTRAR <i class="fa-solid fa-arrow-right-to-bracket ms-1"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
